---
#010-user-group-suporte

# Cria usuário suporte se não existe
    - name: Verificar se o usuário suporte existe
      command: id -u suporte
      register: suporte_id
      ignore_errors: true
      become: true

    - name: Criar o usuário suporte se n existe
      user:
        name: suporte
        create_home: yes
      when: suporte_id.rc != 0
      become: true
    
# Atualiza senhas de suporte e root
    # As senhas são definidas nas variáveis PASS_SUPPORT e PASS_ROOT, não esqueça de alterá-las
    - name: Atualizar senha do usuário suporte
      user:
        name: suporte
        password: "{{ PASS_SUPPORT | password_hash('sha512') }}"
      vars:
        PASS_SUPPORT: "senha do suporte"
      tags:
        - passwords
      become: true

    - name: Atualizar senha do usuário root
      user:
        name: root
        password: "{{ PASS_ROOT | password_hash('sha512') }}"
      vars:
        PASS_ROOT: "senha do root"
      tags:
        - passwords
      become: true

# Seta grupo principal de suporte para users e deleta grupo suporte se existe
# Também tira suporte de grupos de admin
    - name: Definir grupo principal do usuário suporte para users
      user:
        name: suporte
        group: users
      become: true

    - name: Remover grupo suporte, se existir
      group:
        name: suporte
        state: absent
      become: true

    - name: Remover suporte do grupo adm
      user:
        name: suporte
        groups: adm
        state: absent
      become: true

    - name: Remover suporte do grupo lpadmin
      user:
        name: suporte
        groups: lpadmin
        state: absent
      become: true

# Garante que o usuário suporte esteja no sudo
    - name: Verificar se o usuário suporte está no grupo sudo
      command: id -Gn suporte
      register: suporte_groups
      become: true

    - name: Adicionar usuário suporte ao grupo sudo
      user:
        name: suporte
        groups: sudo
      when: "'sudo' not in suporte_groups.stdout.split()"
      become: true