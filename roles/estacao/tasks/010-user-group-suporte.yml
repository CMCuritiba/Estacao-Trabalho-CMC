#010-user-group-suporte
- name: Cria usuário suporte e o inclui no grupo sudo
  ansible.builtin.user:
    name: suporte
    group: sudo

- name: tira suporte de grupos admin
  become: true
  command: "gpasswd -d suporte adm lpadmin"
 
- name: Deleta grupo suporte
  ansible.builtin.group:
     name: suporte
     state: absent
