---
# 010-user-group-suporte

# Cria usuário suporte se não existe, atenção o sheel padrão vai ser o /bin/sh
- name: Configura usuário suporte
  ansible.builtin.user:
    name: suporte
    create_home: true
    state: present
    password: "{{ suporte_passwd }}"
    group: users
    append: false
    groups:
      - sudo
  vars:
    suporte_passwd: "suporte"
  become: true

# Atualiza senhas de suporte e root
# As senhas são definidas nas variáveis suporte_passwd e root_passwd, não esqueça de alterá-las

- name: Atualizar senha do usuário root
  ansible.builtin.user:
    name: root
    password: "{{ root_passwd }}"
  vars:
    root_passwd: "root"
  tags:
    - passwords
  become: true

# Seta grupo principal de suporte para users, seta grupos do suporte
# e deleta grupo suporte se existe

- name: Remover grupo suporte, se existir
  ansible.builtin.group:
    name: suporte
    state: absent
  become: true
