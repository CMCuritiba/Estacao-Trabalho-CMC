---
#030-instala-programas

- name: Instala programas adicionais
  ansible.builtin.apt:
    name:
      # Acesso remoto
      - rdesktop
      - vino
      - openssh-server
      # Midia
      - vlc
      - audacity
      - exfat-fuse
      - exfat-utils
      - shotwell
      - gimp
      - gimp-help-pt
      - drawing
      - inkscape
      # Codecs multimida
      - gstreamer1.0-libav
      - gstreamer1.0-plugins-bad
      - gstreamer1.0-plugins-ugly
      - gstreamer1.0-vaapi
      - libavcodec-extra
      - libdvdcss2
      - libdvdnav4
      - libdvdread7
      - libhal1-flash
      # Utilitarios e produtividade
      - vim
      - gedit
      - pdfsam
      - unrar
      - ttf-mscorefonts-installer
      # SO
      - ncdu
      - numlockx
      - acct
      - xmlstarlet
      - jq
      - nfs-common
    state: present
    update_cache: true
    cache_valid_time: 80000
