---
# 050-config-browsers

- name: Configura firefox
  ansible.builtin.copy:
    dest: "/usr/lib/firefox/{{ item.path }}"
    content: "{{ item.content }}"
    mode: "0644"
  with_items:
    - path: "defaults/pref/local-settings.js"
      content: |
        //
        pref("general.config.filename", "mozilla.cfg");
        pref("general.config.obscure_value", 0);
    - path: "mozilla.cfg"
      content: |
        //
        lockPref("browser.startup.homepage", "http://intranet.cmc.pr.gov.br/");
        lockPref("network.proxy.type", 0);
        lockPref("browser.startup.page", 1);
        lockPref("print.print_footerleft", "");
        lockPref("print.print_footerright", "");
        lockPref("print.print_headerleft", "");
        lockPref("print.print_headerright", "");
        lockPref("startup.homepage_welcome_url", "");
        lockPref("browser.rights.3.shown", true);
    - path: "browser/override.ini"
      content: |
        [XRE]
        EnableProfileMigrator=false

- name: Coloca firefox como navegador padrão
  community.general.alternatives:
    link: /usr/bin/x-www-browser
    name: x-www-browser
    path: /usr/bin/firefox
    priority: 999
    state: present

- name: Cria pastas de configuração do Chrome
  ansible.builtin.file:
    state: directory
    path: "/etc/opt/chrome/policies/{{ item }}"
    mode: "0755"
  with_items:
    - recommended
    - managed

- name: Configura Google Chrome
  ansible.builtin.copy:
    dest: "/etc/opt/chrome/policies/recommended/cmc.json"
    mode: "0644"
    content: "{{ google_chrome_recommended | ansible.builtin.to_json }}"

- name: Gera bookmarks dos navegadores
  ansible.builtin.template:
    dest: "{{ item.bookmarks_config_file }}"
    src: "templates/bookmarks_{{ item.browser }}.j2"
    lstrip_blocks: true
    mode: "0644"
  with_items:
    - browser: "firefox"
      bookmarks_config_file: "/usr/lib/firefox/distribution/policies.json"
    - browser: google-chrome
      bookmarks_config_file: "/etc/opt/chrome/policies/managed/cmc.json"
