# 080-desabilita-tty

# Desabilita a troca de terminals com CTRL + ALT + Fx

    - name: Verificar se o arquivo /etc/X11/xorg.conf existe
      stat:
        path: /etc/X11/xorg.conf
      register: xorg_conf_stat
      become: true
      
    - name: Adicionar a opção "DontVTSwitch" se necessário
      lineinfile:
        path: /etc/X11/xorg.conf
        line: '    Option "DontVTSwitch" "true"'
        insertafter: EOF
        state: present
      when: not xorg_conf_stat.stat.exists or not xorg_conf_stat.stat.isreg or "'Option \"DontVTSwitch\" \"true\"'" not in ansible_filepath
      become: true
