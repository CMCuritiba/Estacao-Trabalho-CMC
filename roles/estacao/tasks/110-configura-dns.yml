---
# 110-configura-dns

- name: Check if resolved.conf exists
  ansible.builtin.stat:
    path: /etc/systemd/resolved.conf
  register: resolved_conf

# Habilita cache de DNS
- name: Configura DNS
  ansible.builtin.lineinfile:
    path: "{{ resolved_conf.stat.path }}"
    line: "{{ item }}"
    state: present
  when: resolved_conf.stat.exists and not (resolved_conf.stat.islnk or resolved_conf.stat.isdir)
  notify: Restart systemd-resolved
  with_items:
    - "Cache=no-negative"
    - "Domains=cmc.pr.gov.br"
    - "FallbackDNS=8.8.8.8 9.9.9.9"
