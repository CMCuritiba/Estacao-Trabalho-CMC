---

- name: Verifica se /etc/fstab existe
  ansible.builtin.stat:
    path: /etc/fstab
  register: fstab_file

- name: Montando NSF
  when: fstab_file.stat.exists
  block:
    - name: Cria diretório de montagem
      ansible.builtin.file:
        path: /mnt/suporte
        state: directory
        mode: "0755"

    - name: Configura /etc/fstab
      ansible.posix.mount:
        path: "{{ path }}"
        src: "{{ src }}"
        fstype: "{{ fstype }}"
        opts: "{{ opts }}"
        dump: "{{ dump }}"
        passno: "{{ passno }}"
        backup: true
        state: present
      vars:
        src: "{{ estacao_env.nfs_serv.split()[0] | trim }}"
        path: "{{ estacao_env.nfs_serv.split()[1] | trim }}"
        fstype: "{{ estacao_env.nfs_serv.split()[2] | trim }}"
        opts: "{{ estacao_env.nfs_serv.split()[3] | trim }}"
        dump: "{{ estacao_env.nfs_serv.split()[4] | trim }}"
        passno: "{{ estacao_env.nfs_serv.split()[5] | trim }}"
