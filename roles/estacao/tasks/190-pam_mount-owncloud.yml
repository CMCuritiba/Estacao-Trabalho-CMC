---
- name: "(pam_mount-owncloud.yml) Instala pacotes : ({{ task_name }})"
  ansible.builtin.apt:
    name:
      - davfs2
      - libpam-mount
    state: present
  environment:
    DEBIAN_FRONTEND: nointeractive

- name: "Copia arquivo de configurção pam_mount-owncloud : ({{ task_name }})"
  ansible.builtin.copy:
    dest: "/etc/security/pam_mount.conf.xml"
    src: pam_mount.template.conf.xml
    mode: preserve
