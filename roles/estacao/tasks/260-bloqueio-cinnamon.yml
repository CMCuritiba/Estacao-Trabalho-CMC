---

- name: "Remove execução dos programas default : ({{ task_name }})"
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0700"
  with_items:
    - /usr/bin/gnome-terminal
    - /usr/bin/mintupdate
    - /usr/bin/mintreport
    - /usr/bin/cinnamon-menu-editor
    - /usr/bin/cinnamon-desktop-editor
    - /usr/bin/nm-connection-editor
    - /usr/bin/nm-applet
    - /usr/bin/gnome-keyring
    - /usr/bin/gnome-keyring-3
    - /usr/bin/gnome-keyring-daemon

- name: "Adiciona dtic aos sudoers : ({{ task_name }})"
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    line: "%{{ estacao_env.dtic_gid }}\tALL=(ALL:ALL) ALL"
    validate: 'visudo -cf %s'

- name: "Cria uma ACL para ajustar as permissões do usuário suporte : ({{ task_name }})"
  ansible.posix.acl:
    path: "{{ item.path }}"
    entity: suporte
    etype: user
    state: present
    permissions: "{{ item.permissions | default('rx') }}"
  with_items:
    - path: /usr/bin/gnome-terminal
      permissions: "rwx"
    - path: /usr/bin/cinnamon-desktop-editor
    - path: /usr/bin/nm-connection-editor
    - path: /usr/bin/nm-applet

- name: "Cria uma ACL para ajustar as permissões da DTIC : ({{ task_name }})"
  ansible.posix.acl:
    path: "{{ item.path }}"
    entity: "{{ estacao_env.dtic_gidnumber }}"
    etype: group
    state: present
    permissions: "{{ item.permissions | default('rx') }}"
  with_items:
    - path: /usr/bin/gnome-terminal
    - path: /usr/bin/cinnamon-desktop-editor
    - path: /usr/bin/nm-connection-editor
    - path: /usr/bin/nm-applet

- name: "Assegura permissão de montagem de dispositivos externos (pendrives, HDs, etc) : ({{ task_name }})"
  community.general.xml:
    path: /usr/share/polkit-1/actions/org.freedesktop.UDisks2.policy
    xpath: "//policyconfig/action[@id='org.freedesktop.udisks2.{{ item[0] }}']/defaults/{{ item[1] }}"
    value: "yes"
  loop: "{{ fsms | product(default_acls) | list }}"
  vars:
    fsms:
      - filesystem-mount
      - filesystem-unmount-others
      - filesystem-mount-system
    default_acls:
      - allow_any
      - allow_inactive
      - allow_active
