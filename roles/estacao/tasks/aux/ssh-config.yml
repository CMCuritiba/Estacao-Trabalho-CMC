---
- name: "(logger) {{ item.msg }}"
  community.general.syslogger:
    msg: "{{ item.msg }}"
  changed_when: false

- name: "(action) {{ item.msg }}"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^{{ item.config.name }}"
    line: "{{ item.config.name }} {{ item.config.value }}"
