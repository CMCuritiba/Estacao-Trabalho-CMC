---
# tasks file for estacao

#020-remover-programas
- name: Remover Programas
  apt:
    name: "thunderbird*, transmission*, avahi-daemon, xed, hexchat*, celluloid*, warpinator"
    state: absent
    update_cache: true
    cache_valid_time: 80000


- name: Altera repositório para source local
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/official-package-repositories.list
    regexp: '//archive.ubuntu.com'
    replace: '//br.archive.ubuntu.com'
    backup: true

#010-user-group-suporte
- name: Cria usuário suporte e o inclui no grupo sudo
  ansible.builtin.user:
    name: suporte
    group: sudo

- name: tira suporte de grupos admin
  become: true
  command: "gpasswd -d suporte adm lpadmin"
 
 - name: Deleta grupo suporte
  ansible.builtin.group:
    name: suporte
    state: absent
