---
# vars file for estacao
estacao_env:
  pass_support: "{{ lookup('ansible.builtin.env', 'PASS_SUPPORT') | default(estacao_default.pass_support, true) }}"
  pass_root: "{{ lookup('ansible.builtin.env', 'PASS_ROOT') | default(estacao_default.pass_root, true) }}"
  pass_vcn: "{{ lookup('ansible.builtin.env', 'PASS_VCN') | default(estacao_default.pass_vcn, true) }}"
  vcnpass64: "{{ lookup('ansible.builtin.env', 'PASS_VCN') | default(estacao_default.pass_vcn, true) | b64encode }}"
  dtic_network: "{{ lookup('ansible.builtin.env', 'DTIC_NETWORK') | default(estacao_default.dtic_network, true) }}"
  serv_ldap: "{{ lookup('ansible.builtin.env', 'SERV_LDAP') | default(estacao_default.serv_ldap, true) }}"
  ldap_users_dn: "{{ lookup('ansible.builtin.env', 'LDAP_USERS_DN') | default(estacao_default.ldap_users_dn, true) }}"
  ldap_groups_dn: "{{ lookup('ansible.builtin.env', 'LDAP_GROUPS_DN') | default(estacao_default.ldap_groups_dn, true) }}"
  bind_dn: "{{ lookup('ansible.builtin.env', 'BIND_DN') | default(estacao_default.bind_dn, true) }}"
  bind_pw: "{{ lookup('ansible.builtin.env', 'BIND_PW') | default(estacao_default.bind_pw, true) }}"
  nfs_serv: "{{ lookup('ansible.builtin.env', 'NFS_SERV') | default(estacao_default.nfs_serv, true) }}"
  dtic_gid: "{{ lookup('ansible.builtin.env', 'DTIC_GID') | default(estacao_default.dtic_gid, true) }}"
  dtic_gidnumber: "{{ lookup('ansible.builtin.env', 'DTIC_GIDNUMBER') | default(estacao_default.dtic_gidnumber, true) }}"

estacao_google_chrome_recommended:
  HomepageLocation: "http://intranet.cmc.pr.gov.br/"
  RestoreOnStartup: 4
  RestoreOnStartupURLs:
    - "http://intranet.cmc.pr.gov.br/"
  HomepageIsNewTabPage: false

